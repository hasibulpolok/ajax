<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Print Interval</title>
</head>
<body>
    <Script>
        setInterval (function(){
            document.write("hello")
        },100)
    </Script>
</body>
</html>
