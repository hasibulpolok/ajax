<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Color & Image Change</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
        }

        #box{
            width: 400px;
            height: 400px;
            background-color: red;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            font-weight: bold;
            color: white;
            gap: 15px;
        }

        #box img{
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="box">
        <img id="photo" src="https://picsum.photos/id/101/200/200" alt="">
        <span>Hello World</span>
    </div>

    <script>

        let i = 0;

        const bgColors = ["red", "blue", "green", "orange", "purple"];
        const textColors = ["white", "yellow", "cyan", "pink", "lime"];

        const photos = [
            "https://picsum.photos/id/101/200/200",
            "https://picsum.photos/id/102/200/200",
            "https://picsum.photos/id/103/200/200",
            "https://picsum.photos/id/104/200/200",
            "https://picsum.photos/id/105/200/200"
        ];

        setInterval(function () {

    
            $("#box").css({
                "background-color": bgColors[i],
                "color": textColors[i]
            });

         
            $("#photo").attr("src", photos[i]);

            i++;

    
            if(i >= bgColors.length){
                i = 0;
            }

        }, 2000);

    </script>

</body>
</html>
